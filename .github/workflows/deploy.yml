name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ─── 1. Build + déploiement frontend ───────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Déployer sur Infomaniak (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: ${{ secrets.FTP_FRONTEND_DIR }}

  # ─── 2. Déploiement backend PHP ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Déployer le code backend (hors public/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ${{ secrets.FTP_BACKEND_DIR }}
          # Ne pas écraser le .env de production
          exclude: |
            **/.env
            **/uploads/**
            **/tests/**
            **/phpunit.phar
            **/phpunit.xml

